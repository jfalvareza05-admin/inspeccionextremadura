<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OpositaInspector · Extremadura</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,600;0,700;1,600&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --ink:#1a1a2e;--ink2:#3d3d5c;--ink3:#8a8aaa;
  --bg:#f4f3ef;--bg2:#ffffff;--bg3:#eceae4;
  --red:#c84b31;--red2:#e8734a;
  --teal:#2d7a6e;--teal2:#3da090;
  --gold:#c9943a;--gold2:#f0c040;
  --blue:#2c5f8a;--purple:#5c3a7e;
  --border:#e0ddd6;
  --r:12px;--r-sm:8px;
  --sh:0 2px 12px rgba(0,0,0,.06),0 1px 3px rgba(0,0,0,.04);
  --sh-lg:0 8px 32px rgba(0,0,0,.12),0 2px 8px rgba(0,0,0,.06);
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--ink);min-height:100vh;overflow-x:hidden}

/* ── LOGIN ── */
#login-screen{position:fixed;inset:0;background:linear-gradient(160deg,#1a1a2e 0%,#8b2a18 55%,#e8a44a 100%);display:flex;align-items:center;justify-content:center;z-index:9999;overflow:hidden}
#login-screen::after{content:'📚';position:absolute;font-size:220px;bottom:-30px;right:-20px;opacity:.06;line-height:1;pointer-events:none}
.login-box{position:relative;background:#fff;border-radius:24px;padding:40px 36px 32px;width:100%;max-width:370px;box-shadow:0 24px 64px rgba(0,0,0,.3);overflow:hidden}
.login-box::before{content:'';position:absolute;width:200px;height:200px;border-radius:50%;background:linear-gradient(135deg,#c84b31,#e8734a);top:-80px;right:-80px;opacity:.08}
.login-box::after{content:'';position:absolute;width:140px;height:140px;border-radius:50%;background:#2d7a6e;bottom:-60px;left:-60px;opacity:.07}
.login-eyebrow{display:inline-flex;align-items:center;gap:5px;background:#fff3f0;color:#c84b31;font-size:10px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;padding:4px 10px;border-radius:20px;margin-bottom:14px;border:1px solid rgba(200,75,49,.15)}
.login-logo{font-family:'Playfair Display',serif;font-size:26px;color:#1a1a2e;margin-bottom:3px;line-height:1.2}
.login-sub{font-size:12px;color:#8a8aaa;margin-bottom:26px}
.login-tabs{display:flex;gap:3px;background:#f4f3ef;border-radius:10px;padding:3px;margin-bottom:22px}
.ltab{flex:1;padding:9px;border:none;background:none;color:#8a8aaa;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500;border-radius:8px;cursor:pointer;transition:.15s}
.ltab.active{background:#fff;color:#1a1a2e;box-shadow:0 1px 5px rgba(0,0,0,.1)}
.l-field{margin-bottom:14px}
.l-label{display:block;font-size:12px;color:#3d3d5c;font-weight:500;margin-bottom:5px}
.l-input{width:100%;padding:11px 14px;background:#f7f6f2;border:1.5px solid #e8e5df;border-radius:10px;color:#1a1a2e;font-family:'DM Sans',sans-serif;font-size:14px;outline:none;transition:.15s}
.l-input:focus{border-color:#c84b31;background:#fff;box-shadow:0 0 0 3px rgba(200,75,49,.08)}
.l-input::placeholder{color:#c0bdd0}
.l-btn{width:100%;padding:13px;background:linear-gradient(90deg,#c84b31 0%,#e8734a 100%);border:none;border-radius:10px;color:#fff;font-family:'DM Sans',sans-serif;font-size:15px;font-weight:600;cursor:pointer;transition:.2s;margin-top:4px;box-shadow:0 4px 16px rgba(200,75,49,.3)}
.l-btn:hover{transform:translateY(-1px);box-shadow:0 7px 22px rgba(200,75,49,.4)}
.l-btn:active{transform:translateY(0)}
.l-err{font-size:12px;color:#c84b31;text-align:center;margin-top:10px;min-height:18px;font-weight:500}

/* ── LAYOUT ── */
.app{display:flex;min-height:100vh}
.sidebar{width:265px;min-height:100vh;background:linear-gradient(180deg,#1a1a2e 0%,#2a1a3e 60%,#1a2e2a 100%);display:flex;flex-direction:column;position:fixed;left:0;top:0;bottom:0;z-index:100;transition:transform .3s;overflow:hidden}
.sidebar::before{content:'';position:absolute;width:300px;height:300px;border-radius:50%;background:radial-gradient(circle,rgba(200,75,49,.15),transparent 70%);top:-100px;right:-100px;pointer-events:none}
.sb-logo{padding:24px 20px 16px;border-bottom:1px solid rgba(255,255,255,.07);position:relative}
.sb-logo-icon{font-size:28px;margin-bottom:6px;display:block}
.sb-logo-title{font-family:'Playfair Display',serif;font-size:18px;color:#fff;line-height:1.2}
.sb-logo-sub{font-size:9px;letter-spacing:2px;text-transform:uppercase;color:rgba(255,255,255,.3);margin-top:3px}
.sb-user{padding:12px 16px;border-bottom:1px solid rgba(255,255,255,.06);display:flex;align-items:center;gap:10px;position:relative}
.sb-avatar{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:600;flex-shrink:0;border:2px solid rgba(255,255,255,.15)}
.sb-avatar.admin{background:linear-gradient(135deg,#c84b31,#e8734a);color:#fff}
.sb-avatar.alumno{background:linear-gradient(135deg,#2d7a6e,#3da090);color:#fff}
.sb-username{font-size:13px;color:rgba(255,255,255,.85);font-weight:500}
.sb-role{font-size:9px;color:rgba(255,255,255,.35);text-transform:uppercase;letter-spacing:1.5px}
.sb-nav{padding:12px 8px;flex:1;position:relative}
.nav-section{font-size:9px;letter-spacing:2px;text-transform:uppercase;color:rgba(255,255,255,.2);padding:10px 12px 4px}
.nav-item{display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:9px;cursor:pointer;color:rgba(255,255,255,.5);font-size:13px;font-weight:400;transition:.15s;margin-bottom:2px;border:none;background:none;width:100%;text-align:left}
.nav-item:hover{background:rgba(255,255,255,.07);color:rgba(255,255,255,.9);transform:translateX(2px)}
.nav-item.active{background:linear-gradient(90deg,rgba(200,75,49,.3),rgba(200,75,49,.08));color:#f09070;font-weight:500;border-left:3px solid #c84b31;padding-left:9px}
.nav-item .ico{font-size:15px;width:20px;text-align:center}
.sb-footer{padding:14px 20px;border-top:1px solid rgba(255,255,255,.06)}
.logout-btn{display:flex;align-items:center;gap:8px;font-size:12px;color:rgba(255,255,255,.35);cursor:pointer;border:none;background:none;font-family:'DM Sans',sans-serif;transition:.15s}
.logout-btn:hover{color:rgba(255,255,255,.7)}

.main{margin-left:265px;flex:1;display:flex;flex-direction:column;background:var(--bg)}
.topbar{background:rgba(255,255,255,.95);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);padding:12px 28px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50}
.page-title{font-family:'Playfair Display',serif;font-size:18px;color:var(--ink)}
.content{padding:28px;flex:1}
.view{display:none}.view.active{display:block}

/* ── HERO BANNER ── */
.hero-banner{background:linear-gradient(120deg,#1a1a2e 0%,#8b2a18 55%,#c9943a 100%);border-radius:16px;padding:26px 32px 26px;color:#fff;margin-bottom:24px;position:relative;overflow:hidden}
.hero-banner::before{content:'📖';position:absolute;font-size:90px;right:32px;top:50%;transform:translateY(-50%);opacity:.15;line-height:1}
.hero-title{font-family:'Playfair Display',serif;font-size:21px;margin-bottom:4px}
.hero-sub{font-size:12px;opacity:.65;max-width:400px}

/* ── STAT CARDS COLORIDAS ── */
.sc-red{background:linear-gradient(135deg,#c84b31,#e8734a);border-radius:var(--r);padding:18px;box-shadow:0 4px 18px rgba(200,75,49,.3)}
.sc-teal{background:linear-gradient(135deg,#2d7a6e,#3da090);border-radius:var(--r);padding:18px;box-shadow:0 4px 18px rgba(45,122,110,.3)}
.sc-blue{background:linear-gradient(135deg,#2c5f8a,#4a8fc4);border-radius:var(--r);padding:18px;box-shadow:0 4px 18px rgba(44,95,138,.3)}
.sc-gold{background:linear-gradient(135deg,#b8780a,#d4a843);border-radius:var(--r);padding:18px;box-shadow:0 4px 18px rgba(180,120,10,.3)}
.sc-red,.sc-teal,.sc-blue,.sc-gold{color:#fff}
.scc-ico{font-size:26px;margin-bottom:8px;display:block;opacity:.9}
.scc-lbl{font-size:10px;text-transform:uppercase;letter-spacing:1px;opacity:.7;margin-bottom:5px}
.scc-val{font-size:28px;font-weight:700;font-variant-numeric:tabular-nums;line-height:1}
.scc-sub{font-size:11px;opacity:.65;margin-top:4px}

/* ── TEMA CARDS MEJORADAS ── */
.tema-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:15px 18px;display:flex;align-items:center;gap:14px;box-shadow:var(--sh);transition:.2s;cursor:pointer;margin-bottom:8px}
.tema-card:hover{border-color:var(--red);box-shadow:0 6px 24px rgba(200,75,49,.12);transform:translateY(-2px)}

/* ── BUTTONS ── */
.btn{padding:8px 16px;border-radius:var(--r-sm);border:none;cursor:pointer;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500;transition:.15s}
.btn-primary{background:var(--red);color:#fff}.btn-primary:hover{background:var(--red2)}
.btn-teal{background:var(--teal);color:#fff}.btn-teal:hover{background:var(--teal2)}
.btn-secondary{background:var(--bg3);color:var(--ink2);border:1px solid var(--border)}.btn-secondary:hover{background:var(--border)}
.btn-ghost{background:transparent;color:var(--ink3);border:1px solid var(--border)}.btn-ghost:hover{background:var(--bg3)}
.btn-sm{padding:5px 11px;font-size:12px}
.btn-xs{padding:3px 8px;font-size:11px}
.btn-icon{padding:6px;width:30px;height:30px;display:flex;align-items:center;justify-content:center}
.btn-danger{background:rgba(200,75,49,.1);color:var(--red);border:1px solid rgba(200,75,49,.2)}.btn-danger:hover{background:rgba(200,75,49,.2)}

/* ── CARDS ── */
.card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:22px;box-shadow:var(--sh)}
.section-title{font-family:'Playfair Display',serif;font-size:16px;color:var(--ink);margin-bottom:14px}

/* ── STATS ── */
.stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:24px}
.stat-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:18px;box-shadow:var(--sh)}
.stat-card .sc-lbl{font-size:10px;text-transform:uppercase;letter-spacing:1px;color:var(--ink3);margin-bottom:6px}
.stat-card .sc-val{font-size:28px;font-weight:600;color:var(--ink);font-variant-numeric:tabular-nums}
.stat-card .sc-sub{font-size:11px;color:var(--ink3);margin-top:3px}

/* ── FORMS ── */
.form-field{margin-bottom:16px}
.form-label{display:block;font-size:12px;font-weight:500;color:var(--ink2);margin-bottom:5px}
.form-input{width:100%;padding:9px 13px;border:1px solid var(--border);border-radius:var(--r-sm);font-family:'DM Sans',sans-serif;font-size:13px;color:var(--ink);background:var(--bg2);outline:none;transition:.15s}
.form-input:focus{border-color:var(--red)}
textarea.form-input{resize:vertical;min-height:100px;line-height:1.5}
select.form-input{cursor:pointer}

/* ── BADGES ── */
.badge{display:inline-flex;align-items:center;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:500}
.badge-green{background:rgba(45,122,110,.12);color:var(--teal)}
.badge-amber{background:rgba(201,148,58,.15);color:var(--gold)}
.badge-gray{background:var(--bg3);color:var(--ink3)}
.badge-red{background:rgba(200,75,49,.1);color:var(--red)}
.badge-blue{background:rgba(44,95,138,.1);color:var(--blue)}

/* ── ADMIN TABLE ── */
.data-table{width:100%;border-collapse:collapse}
.data-table th{text-align:left;font-size:10px;text-transform:uppercase;letter-spacing:1px;color:var(--ink3);padding:6px 10px 10px;border-bottom:1px solid var(--border)}
.data-table td{padding:10px;font-size:13px;border-bottom:1px solid var(--bg3);color:var(--ink2);vertical-align:middle}
.data-table tr:hover td{background:var(--bg3)}

/* ── MODAL ── */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:1000;display:none;align-items:flex-start;justify-content:center;padding:32px 16px;overflow-y:auto}
.modal-overlay.open{display:flex}
.modal{background:var(--bg2);border-radius:16px;width:100%;max-width:700px;box-shadow:var(--sh-lg);animation:slideIn .2s ease;flex-shrink:0}
@keyframes slideIn{from{opacity:0;transform:translateY(-10px)}to{opacity:1;transform:none}}
.modal-hd{padding:20px 24px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.modal-title{font-family:'Playfair Display',serif;font-size:18px}
.modal-body{padding:20px 24px}
.modal-ft{padding:12px 24px 20px;display:flex;gap:8px;justify-content:flex-end}
.close-btn{background:none;border:none;cursor:pointer;font-size:18px;color:var(--ink3);line-height:1}

/* ── UPLOAD ZONE ── */
.upload-zone{border:2px dashed var(--border);border-radius:var(--r);padding:36px 20px;text-align:center;cursor:pointer;transition:.2s;background:var(--bg2)}
.upload-zone:hover,.upload-zone.drag{border-color:var(--red);background:rgba(200,75,49,.03)}
.upload-icon{font-size:32px;margin-bottom:10px}
.upload-title{font-size:14px;font-weight:500;color:var(--ink);margin-bottom:4px}
.upload-sub{font-size:12px;color:var(--ink3)}

/* ── RESOURCE TABS ── */
.rcon{display:none}.rcon.active{display:block}

/* ── RESOURCE CARD GRID ── */
.rec-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:4px}
.rec-card{border-radius:14px;padding:16px 14px 14px;cursor:pointer;transition:.2s;position:relative;overflow:hidden;border:1.5px solid transparent;text-align:left}
.rec-card:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(0,0,0,.12)}
.rec-card.unavailable{opacity:.6;cursor:default}
.rec-card.unavailable:hover{transform:none;box-shadow:none}
.rec-card-ico{font-size:28px;margin-bottom:10px;display:block;line-height:1}
.rec-card-name{font-size:12px;font-weight:600;color:#fff;margin-bottom:3px;line-height:1.3}
.rec-card-desc{font-size:10px;opacity:.7;color:#fff;line-height:1.4}
.rec-card-badge{position:absolute;top:10px;right:10px;font-size:9px;font-weight:700;padding:2px 7px;border-radius:10px;letter-spacing:.5px;text-transform:uppercase}
.rec-badge-ok{background:rgba(255,255,255,.25);color:#fff}
.rec-badge-pend{background:rgba(0,0,0,.2);color:rgba(255,255,255,.7)}
.rec-badge-yo{background:rgba(255,255,255,.3);color:#fff}

/* ── RESOURCE CONTENT PANEL ── */
.rec-panel{display:none;animation:fadeUp .2s ease}
.rec-panel.open{display:block}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
.rec-panel-header{display:flex;align-items:center;gap:10px;padding:12px 14px;border-radius:12px;margin-bottom:16px;cursor:pointer;transition:.15s}
.rec-panel-header:hover{opacity:.85}
.rec-panel-back{font-size:16px;line-height:1}
.rec-panel-htitle{font-size:13px;font-weight:600;color:#fff;flex:1}
.rec-panel-hsub{font-size:10px;opacity:.7;color:#fff}

/* ── LOADING ── */
.spin-wrap{display:flex;flex-direction:column;align-items:center;padding:40px 20px;gap:14px}
.spinner{width:36px;height:36px;border:3px solid var(--border);border-top-color:var(--red);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.spin-text{font-size:13px;color:var(--ink3)}

/* ── QUIZ ── */
.q-card{background:var(--bg);border:1px solid var(--border);border-radius:var(--r-sm);padding:14px;margin-bottom:12px}
.q-text{font-size:13px;font-weight:500;color:var(--ink);margin-bottom:10px}
.q-opt{display:flex;align-items:flex-start;gap:8px;padding:7px 10px;border-radius:6px;cursor:pointer;margin-bottom:3px;font-size:12px;color:var(--ink2);border:1px solid transparent;transition:.1s}
.q-opt:hover{background:var(--bg3)}
.q-opt.correct{background:rgba(45,122,110,.1);border-color:var(--teal);color:var(--teal)}
.q-opt.wrong{background:rgba(200,75,49,.08);border-color:var(--red);color:var(--red)}
.q-exp{margin-top:7px;padding:7px 10px;background:rgba(201,148,58,.1);border-radius:6px;font-size:11px;color:#7a5a10;display:none}
.quiz-score{text-align:center;padding:20px;background:var(--bg3);border-radius:var(--r);margin-top:14px}
.score-num{font-size:44px;font-weight:600;color:var(--teal)}
.score-lbl{font-size:13px;color:var(--ink3)}

/* ── FLASHCARDS ── */
.fc-wrap{perspective:1000px;height:200px;cursor:pointer;margin-bottom:16px}
.fc{width:100%;height:100%;position:relative;transform-style:preserve-3d;transition:transform .5s}
.fc.flipped{transform:rotateY(180deg)}
.fc-face{position:absolute;inset:0;backface-visibility:hidden;border-radius:var(--r);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px;text-align:center}
.fc-front{background:var(--ink);color:#fff}
.fc-back{background:var(--teal);color:#fff;transform:rotateY(180deg)}
.fc-lbl{font-size:9px;letter-spacing:2px;text-transform:uppercase;opacity:.5;margin-bottom:10px}
.fc-txt{font-size:14px;font-weight:500;line-height:1.5}
.fc-nav{display:flex;align-items:center;justify-content:space-between}
.fc-ctr{font-size:12px;color:var(--ink3)}

/* ── INFOGRAFÍA ── */
.infog{background:linear-gradient(135deg,#1a1a2e,#2d1f45,#1a2e35);border-radius:var(--r);padding:24px;color:#fff;min-height:360px}
.infog-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-top:16px}
.infog-block{background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.1);border-radius:9px;padding:13px}
.infog-block-ico{font-size:20px;margin-bottom:6px}
.infog-block-title{font-size:11px;font-weight:600;color:#f0c040;margin-bottom:4px}
.infog-block-txt{font-size:11px;opacity:.75;line-height:1.6}

/* ── TIMELINE ── */
.timeline{position:relative;padding-left:24px}
.timeline::before{content:'';position:absolute;left:8px;top:0;bottom:0;width:2px;background:var(--border)}
.tl-item{position:relative;margin-bottom:14px}
.tl-dot{position:absolute;left:-20px;top:3px;width:9px;height:9px;border-radius:50%;background:var(--red);border:2px solid var(--bg2)}
.tl-date{font-size:10px;font-weight:600;color:var(--red);text-transform:uppercase;letter-spacing:.5px;margin-bottom:2px}
.tl-text{font-size:12px;color:var(--ink2);line-height:1.5}

/* ── SHORT ANSWER ── */
.sa-q{background:var(--bg);border:1px solid var(--border);border-radius:var(--r-sm);padding:14px;margin-bottom:12px}
.sa-q-text{font-size:13px;font-weight:500;margin-bottom:10px}
.sa-textarea{width:100%;padding:9px 12px;border:1px solid var(--border);border-radius:6px;font-family:'DM Sans',sans-serif;font-size:12px;resize:vertical;min-height:70px;background:var(--bg2);outline:none}
.sa-feedback{margin-top:8px;padding:8px 12px;border-radius:6px;font-size:12px;line-height:1.5;display:none}
.sa-feedback.good{background:rgba(45,122,110,.1);color:var(--teal)}
.sa-feedback.bad{background:rgba(200,75,49,.08);color:var(--red)}

/* ── SCORE HISTORY ── */
.score-bar{height:28px;background:var(--bg3);border-radius:4px;overflow:hidden;margin-bottom:4px;display:flex;align-items:center}
.score-bar-fill{height:100%;background:var(--teal);border-radius:4px;transition:width .5s;display:flex;align-items:center;padding-left:8px}
.score-bar-fill span{font-size:11px;color:#fff;font-weight:500;white-space:nowrap}

/* ── PRESENTACIÓN / SLIDES ── */
.slide-show{background:linear-gradient(135deg,#1a1a2e,#2d1f45);border-radius:var(--r);min-height:300px;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px;color:#fff;text-align:center;position:relative;overflow:hidden}
.slide-num{font-size:10px;letter-spacing:2px;opacity:.4;text-transform:uppercase;position:absolute;top:16px;right:20px}
.slide-title{font-family:'Playfair Display',serif;font-size:22px;margin-bottom:12px}
.slide-body{font-size:14px;opacity:.8;line-height:1.7;max-width:500px}
.slide-nav{display:flex;align-items:center;justify-content:space-between;margin-top:12px}
.slide-dot-row{display:flex;gap:5px}
.slide-dot{width:6px;height:6px;border-radius:50%;background:rgba(255,255,255,.2);cursor:pointer;transition:.2s}
.slide-dot.active{background:#fff}

/* ── ALUMNO TEMA CARD ── */

<script>
// ═══════════════════════════════════════════
// CONFIG & STATE
// ═══════════════════════════════════════════
let CFG = {
  apiKey: localStorage.getItem('cfg-api') || '',
  groqKey: localStorage.getItem('cfg-groq') || '',
  geminiKey: localStorage.getItem('cfg-gemini') || '',
  alumnoProvider: 'gemini',
  provider: localStorage.getItem('cfg-provider') || 'anthropic',
  sheetUrl: localStorage.getItem('cfg-sheet') || '',
  adminPass: localStorage.getItem('cfg-admin-pass') || 'admin1234'
};

function saveConfig() {
  CFG.sheetUrl = localStorage.getItem('cfg-sheet') || '';
}

// Local data fallback (when no Google Sheets configured)
let DB = {
  temas: JSON.parse(localStorage.getItem('db-temas') || '[]'),
  alumnos: JSON.parse(localStorage.getItem('db-alumnos') || JSON.stringify([
    {id:'a1', username:'alumno1', password:'opos2025', nombre:'Alumno Demo', scores:[], progreso:{}}
  ])),
  scores: JSON.parse(localStorage.getItem('db-scores') || '[]'),
  recursosPropios: JSON.parse(localStorage.getItem('db-recursos-propios') || '[]')
};

function saveDB() {
  localStorage.setItem('db-temas', JSON.stringify(DB.temas));
  localStorage.setItem('db-alumnos', JSON.stringify(DB.alumnos));
  localStorage.setItem('db-scores', JSON.stringify(DB.scores));
  localStorage.setItem('db-recursos-propios', JSON.stringify(DB.recursosPropios||[]));
}

// Session
let SESSION = { role: null, user: null };
let currentTema = null;
let currentFlashcards = [], fcIdx = 0;
let currentQuiz = [], currentSA = [];
let currentSlides = [], slideIdx = 0;
let speechSynth = window.speechSynthesis;
let speechUtterance = null;

// ═══════════════════════════════════════════
// GOOGLE SHEETS BRIDGE
// ═══════════════════════════════════════════
async function sheetReq(action, payload={}) {
  if (!CFG.sheetUrl) return null;
  try {
    const url = CFG.sheetUrl + '?action=' + action + '&' + new URLSearchParams(payload);
    const r = await fetch(url);
    return await r.json();
  } catch(e) { return null; }
}

async function sheetPost(action, payload={}) {
  if (!CFG.sheetUrl) return null;
  try {
    const r = await fetch(CFG.sheetUrl, {
      method:'POST', body: JSON.stringify({action, ...payload}),
      headers:{'Content-Type':'application/json'}
    });
    return await r.json();
  } catch(e) { return null; }
}

// ═══════════════════════════════════════════
// LOGIN
// ═══════════════════════════════════════════
let loginTab = 'alumno';
function setLoginTab(t) {
  loginTab = t;
  document.querySelectorAll('.ltab').forEach(b => b.classList.remove('active'));
  event.target.classList.add('active');
  document.getElementById('login-alumno-form').style.display = t==='alumno' ? 'block' : 'none';
  document.getElementById('login-admin-form').style.display = t==='admin' ? 'block' : 'none';
}

function showErr(msg, color='#f08080') {
  const el = document.getElementById('l-err');
  if (el) { el.style.color = color; el.textContent = msg; }
}

async function doLogin() {
  const user = document.getElementById('l-user').value.trim();
  const pass = document.getElementById('l-pass').value;
  if (!user || !pass) { showErr('Completa usuario y contraseña'); return; }

  // Try Google Sheets first
  let alumno = null;
  const remote = await sheetReq('login', {username: user, password: pass});
  if (remote && remote.ok) {
    alumno = remote.alumno;
    DB.alumnos = remote.alumnos || DB.alumnos;
    DB.temas = remote.temas || DB.temas;
  } else {
    alumno = DB.alumnos.find(a => a.username===user && a.password===pass);
  }

  if (!alumno) { showErr('Usuario o contraseña incorrectos'); return; }
  SESSION = { role:'alumno', user: alumno };
  launchApp();
}

function doAdminLogin() {
  const pass = document.getElementById('l-admin-pass').value;
  if (pass !== CFG.adminPass && pass !== 'admin1234') { showErr('Contraseña incorrecta'); return; }
  SESSION = { role:'admin', user: {nombre:'Administrador', username:'admin'} };
  launchApp();
}

function launchApp() {
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('app-shell').style.display = 'flex';
  const isAdmin = SESSION.role === 'admin';
  const av = document.getElementById('sb-avatar');
  av.textContent = SESSION.user.nombre ? SESSION.user.nombre[0].toUpperCase() : 'A';
  av.className = 'sb-avatar ' + SESSION.role;
  document.getElementById('sb-username').textContent = SESSION.user.nombre || SESSION.user.username;
  document.getElementById('sb-role').textContent = isAdmin ? 'Administrador' : 'Alumno';
  renderNav();
  if (isAdmin) showPage('admin-dashboard');
  else showPage('alumno-temas');
}

function logout() {
  SESSION = {role:null,user:null};
  document.getElementById('login-screen').style.display = 'flex';
  document.getElementById('app-shell').style.display = 'none';
  document.getElementById('l-err').textContent = '';
  document.getElementById('l-user').value = '';
  document.getElementById('l-pass').value = '';
  document.getElementById('l-admin-pass').value = '';
  stopAudio();
}

// ═══════════════════════════════════════════
// NAVIGATION
// ═══════════════════════════════════════════
const ADMIN_NAV = [
  {section:'Panel'},
  {id:'admin-dashboard', ico:'📊', label:'Dashboard'},
  {section:'Contenido'},
  {id:'admin-temas', ico:'📚', label:'Gestionar temas'},
  {id:'admin-subir', ico:'⬆️', label:'Subir material'},
  {id:'admin-recursos-propios', ico:'🗂️', label:'Recursos propios'},
  {section:'Usuarios'},
  {id:'admin-alumnos', ico:'👥', label:'Alumnos'},
  {section:'Sistema'},
  {id:'admin-config', ico:'⚙️', label:'Configuración'},
];

const ALUMNO_NAV = [
  {section:'Estudio'},
  {id:'alumno-temas', ico:'📚', label:'Mis temas'},
  {id:'alumno-progreso', ico:'📈', label:'Mi progreso'},
  {section:'Práctica'},
  {id:'alumno-cuestionarios', ico:'❓', label:'Cuestionarios'},
  {id:'alumno-flashcards', ico:'🃏', label:'Flashcards'},
  {section:'Mis recursos'},
  {id:'alumno-repositorio', ico:'🗃️', label:'Mi repositorio'},
];

function renderNav() {
  const nav = SESSION.role==='admin' ? ADMIN_NAV : ALUMNO_NAV;
  document.getElementById('sb-nav').innerHTML = nav.map(n =>
    n.section ? `<div class="nav-section">${n.section}</div>` :
    `<button class="nav-item" id="nav-${n.id}" onclick="showPage('${n.id}')"><span class="ico">${n.ico}</span>${n.label}</button>`
  ).join('');
}

function setActiveNav(id) {
  document.querySelectorAll('.nav-item').forEach(b => b.classList.remove('active'));
  document.getElementById('nav-'+id)?.classList.add('active');
}

function showPage(id) {
  setActiveNav(id);
  const titles = {
    'admin-dashboard':'Dashboard', 'admin-temas':'Gestionar temas', 'admin-subir':'Subir material',
    'admin-alumnos':'Alumnos', 'admin-config':'Configuración', 'admin-recursos-propios':'Recursos propios',
    'alumno-temas':'Mis temas', 'alumno-progreso':'Mi progreso',
    'alumno-cuestionarios':'Cuestionarios', 'alumno-flashcards':'Flashcards', 'alumno-repositorio':'Mi repositorio'
  };
  document.getElementById('page-title').textContent = titles[id] || '';
  const renders = {
    'admin-dashboard': renderAdminDashboard,
    'admin-temas': renderAdminTemas,
    'admin-subir': renderAdminSubir,
    'admin-alumnos': renderAdminAlumnos,
    'admin-config': renderAdminConfig,
    'admin-recursos-propios': renderAdminRecursosPropios,
    'alumno-temas': renderAlumnoTemas,
    'alumno-progreso': renderAlumnoProgreso,
    'alumno-cuestionarios': () => renderSelectorView('cuestionario'),
    'alumno-flashcards': () => renderSelectorView('flashcards'),
    'alumno-repositorio': renderAlumnoRepositorio,
  };
  if (renders[id]) renders[id]();
}

// ═══════════════════════════════════════════
// ADMIN DASHBOARD
// ═══════════════════════════════════════════
function renderAdminDashboard() {
  const temas = DB.temas;

function dropFile(e) { e.preventDefault(); document.getElementById('uz').classList.remove('drag'); const f=e.dataTransfer.files[0]; if(f) handleFileObj(f); }
function handleFile(e) { const f=e.target.files[0]; if(f) handleFileObj(f); }

function handleFileObj(f) {
  document.getElementById('fn').textContent = f.name;
  document.getElementById('fs').textContent = (f.size/1024).toFixed(1)+' KB';
  document.getElementById('fp').style.display = 'flex';

  if (f.name.toLowerCase().endsWith('.pdf')) {
    // Store original PDF as base64 for later download + extract text via PDF.js
    const reader = new FileReader();
    reader.onload = e => {
      _fileContent = '';
      _pdfBase64 = e.target.result; // store full data URL
      // Extract text using PDF.js
      extractPDFText(e.target.result).then(text => {
        _fileContent = text;
        document.getElementById('t-con').value = text.slice(0, 8000);
        if (!document.getElementById('t-tit').value) {
          const line = text.split('\n').find(l => l.trim().length > 5);
          if (line) document.getElementById('t-tit').value = line.trim().slice(0, 120);
        }
        document.getElementById('fp').querySelector('span').textContent = '📑';
      }).catch(() => {
        document.getElementById('t-con').value = '(No se pudo extraer texto automáticamente. Pégalo manualmente.)';
      });
    };
    reader.readAsDataURL(f);
  } else if (f.name.endsWith('.docx') && window.mammoth) {
    _pdfBase64 = null;
    const r = new FileReader();
    r.onload = e => mammoth.extractRawText({arrayBuffer:e.target.result}).then(res=>{
      _fileContent = res.value;
      document.getElementById('t-con').value = _fileContent.slice(0,8000);
      if (!document.getElementById('t-tit').value) {
        const line = res.value.split('\n').find(l=>l.trim().length>5);
        if (line) document.getElementById('t-tit').value = line.trim().slice(0,120);
      }
    });
    r.readAsArrayBuffer(f);
  } else {
    _pdfBase64 = null;
    const r = new FileReader();
    r.onload = e => { _fileContent = e.target.result; document.getElementById('t-con').value = _fileContent.slice(0,8000); };
    r.readAsText(f);
  }
}

async function extractPDFText(dataUrl) {
  // Load PDF.js from CDN dynamically
  if (!window.pdfjsLib) {
    await new Promise((res, rej) => {
      const s = document.createElement('script');
      s.src = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js';
      s.onload = res; s.onerror = rej;
      document.head.appendChild(s);
    });
    window.pdfjsLib.GlobalWorkerOptions.workerSrc =
      'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
  }
  const base64 = dataUrl.split(',')[1];
  const binary = atob(base64);
  const bytes = new Uint8Array(binary.length);
  for (let i = 0; i < binary.length; i++) bytes[i] = binary.charCodeAt(i);
  const pdf = await window.pdfjsLib.getDocument({data: bytes}).promise;
  let text = '';
  for (let i = 1; i <= pdf.numPages; i++) {
    const page = await pdf.getPage(i);
    const content = await page.getTextContent();
    text += content.items.map(item => item.str).join(' ') + '\n';
  }
  return text.trim();
}

function clearFile() { _fileContent=''; _pdfBase64=null; document.getElementById('fp').style.display='none'; document.getElementById('fi').value=''; }
function clearSubirForm() { clearFile(); ['t-num','t-tit','t-con'].forEach(id=>document.getElementById(id).value=''); }

async function guardarTema() {
  const titulo = document.getElementById('t-tit').value.trim();
  const contenido = document.getElementById('t-con').value.trim();
  if (!titulo) { alert('El título es obligatorio'); return; }
  if (!contenido) { alert('El contenido es obligatorio'); return; }
  const blqRaw = document.getElementById('t-blq').value;
  const bloque = blqRaw.split('–')[0].trim();

  const tema = {
    id: 'T'+Date.now(),
    titulo, contenido, bloque,
    numero: document.getElementById('t-num').value || '',
    publicado: document.getElementById('t-pub').checked,
    fecha: new Date().toISOString(),
    recursosGenerados: 0,
    recursos: {},
    pdfBase64: null  // PDF se guarda por separado para no saturar localStorage
  };
  // Guardar PDF original en clave separada si existe
  if (_pdfBase64) {
    try {
      localStorage.setItem('pdf-' + tema.id, _pdfBase64);
      tema.hasPDF = true;
    } catch(e) {
      console.warn('PDF too large for localStorage, PDF download may not work:', e);
      tema.hasPDF = false;
    }
  }
  DB.temas.push(tema);
  saveDB();

  if (document.getElementById('t-gen').checked && CFG.apiKey) {
    document.getElementById('save-status').textContent = '⚙️ Generando recursos con IA... (esto puede tardar unos segundos)';
    await generarTodosRecursosParaTema(tema);
    document.getElementById('save-status').textContent = '✓ Tema guardado con todos los recursos generados';
  } else {
    document.getElementById('save-status').textContent = '✓ Tema guardado correctamente';
  }
  clearSubirForm();
}

function saveConfig2() {
  CFG.apiKey = document.getElementById('cfg2-api')?.value.trim() || CFG.apiKey;
  CFG.geminiKey = document.getElementById('cfg2-gemini')?.value.trim() || CFG.geminiKey;

function cambiarAdminPass() {

  if (!p1) { document.getElementById('pass-msg').style.color=var_red; document.getElementById('pass-msg').textContent='Introduce una contraseña'; return; }
  if (p1!==p2) { document.getElementById('pass-msg').style.color='var(--red)'; document.getElementById('pass-msg').textContent='Las contraseñas no coinciden'; return; }
  CFG.adminPass = p1;
  localStorage.setItem('cfg-admin-pass', p1);
  document.getElementById('pass-msg').style.color='var(--teal)';
  document.getElementById('pass-msg').textContent='✓ Contraseña actualizada';
}

function renderAlumnoTemas() {
  document.getElementById('topbar-actions').innerHTML = '';
  const todosTemas = DB.temas.filter(t=>t.publicado);
  const alumno = SESSION.user;
  const comp = todosTemas.filter(t=>(alumno.progreso||{})[t.id]?.completado).length;
  const pct = todosTemas.length ? Math.round(comp/todosTemas.length*100) : 0;
  document.getElementById('main-content').innerHTML = `
    <div class="hero-banner" style="margin-bottom:20px">
      <div class="hero-title">Mis temas de oposición 📚</div>
      <div class="hero-sub">${todosTemas.length} temas · ${comp} completados</div>
      <div style="margin-top:12px;display:flex;align-items:center;gap:10px">
        <div style="flex:1;height:6px;background:rgba(255,255,255,.2);border-radius:3px;overflow:hidden">
          <div style="height:100%;width:${pct}%;background:linear-gradient(90deg,#f0c040,#e8734a);border-radius:3px"></div>
        </div>
        <span style="font-size:12px;opacity:.8">${pct}% completado</span>
      </div>
    </div>
    <div style="display:flex;gap:10px;align-items:center;flex-wrap:wrap;margin-bottom:20px">
      <input class="form-input" style="flex:1;min-width:180px" placeholder="🔍  Buscar por número o título..." id="srch-at" oninput="filterAlumnoTemas(this.value)">
      <select class="form-input" style="width:auto" id="fl-at" onchange="filterAlumnoTemas(document.getElementById('srch-at').value)">
        <option value="">Todos los bloques</option>
        <option>Bloque I</option><option>Bloque II</option><option>Bloque III</option><option>Bloque IV</option><option>Otro</option>
      </select>
      <select class="form-input" style="width:auto" id="fl-est" onchange="filterAlumnoTemas(document.getElementById('srch-at').value)">
        <option value="">Todos los estados</option>
        <option value="comp">✅ Completados</option>
        <option value="prog">📖 En progreso</option>
        <option value="pend">⏳ Pendientes</option>
      </select>
    </div>
    <div id="at-list">${buildAlumnoTemaGrid(todosTemas, alumno)}</div>`;
}

function filterAlumnoTemas(q) {
  const blq = document.getElementById('fl-at')?.value || '';
  const est = document.getElementById('fl-est')?.value || '';
  const alumno = SESSION.user;
  let temas = DB.temas.filter(t => t.publicado &&
    (!q || t.titulo.toLowerCase().includes(q.toLowerCase()) || String(t.numero).includes(q)) &&
    (!blq || t.bloque===blq));
  if (est) temas = temas.filter(t=>{
    const p=(alumno.progreso||{})[t.id]||{};
    if(est==='comp') return p.completado;
    if(est==='prog') return p.visto && !p.completado;
    if(est==='pend') return !p.visto;
  });
  document.getElementById('at-list').innerHTML = buildAlumnoTemaGrid(temas, alumno);
}

function buildAlumnoTemaGrid(temas, alumno) {
  if (!temas.length) return `<div class="empty"><div class="empty-ico">🔍</div><div class="empty-tit">Sin resultados</div></div>`;
  const BLOQUES = ['Bloque I','Bloque II','Bloque III','Bloque IV','Otro'];
  const BSTYLE = {
    'Bloque I':  {grad:'linear-gradient(135deg,#c84b31,#e8734a)', pill:'rgba(200,75,49,.12)', txt:'#a03020'},
    'Bloque II': {grad:'linear-gradient(135deg,#2d7a6e,#3da090)', pill:'rgba(45,122,110,.12)', txt:'#1a5a50'},
    'Bloque III':{grad:'linear-gradient(135deg,#2c5f8a,#4a8fc4)', pill:'rgba(44,95,138,.12)', txt:'#1a4070'},
    'Bloque IV': {grad:'linear-gradient(135deg,#5c3a7e,#8a5ab0)', pill:'rgba(92,58,126,.12)', txt:'#4a2070'},
    'Otro':      {grad:'linear-gradient(135deg,#888,#aaa)',         pill:'rgba(100,100,100,.1)', txt:'#555'}
  };
  let html = '';
  for (const blq of BLOQUES) {
    const gr = temas.filter(t=>t.bloque===blq);
    if (!gr.length) continue;
    const s = BSTYLE[blq];
    html += `<div class="blq-sep">
      <div class="blq-sep-line"></div>
      <span class="blq-sep-pill" style="background:${s.pill};color:${s.txt}">${blq}</span>
      <div class="blq-sep-line"></div>
    </div>
    <div class="temas-grid">
      ${gr.map(t=>{
        const p=(alumno?.progreso||{})[t.id]||{};
        const nRec = t.recursos ? Object.keys(t.recursos).length : 0;
        const nRP = (t.recursosPropios||[]).filter(r=>r.publicado).length;
        const eIco = p.completado?'✅':p.visto?'📖':'⏳';
        const eTxt = p.completado?'Completado':p.visto?'Estudiando':'Pendiente';
        const eCol = p.completado?'var(--teal)':p.visto?'var(--gold)':'var(--ink3)';
        const dots = Array(9).fill(0).map((_,i)=>`<div class="tgc-dot ${i<nRec?'on':''}"></div>`).join('');
        return `<div class="tgc" onclick="abrirRecursoAlumno('${t.id}')">
          <div class="tgc-stripe" style="background:${s.grad}"></div>
          <div class="tgc-body">
            <div class="tgc-top">
              <div class="tgc-badge" style="background:${s.grad}">T${t.numero||'?'}</div>
              <div class="tgc-meta">
                <div class="tgc-blq" style="color:${s.txt}">${blq}</div>
                <div class="tgc-titulo">${t.titulo}</div>
              </div>
            </div>
            <div class="tgc-foot">
              <div class="tgc-estado" style="color:${eCol}">${eIco} ${eTxt}</div>
              <div style="display:flex;align-items:center;gap:8px">
                ${nRP>0?`<span class="badge badge-amber" style="font-size:9px">📎 ${nRP} recurso${nRP>1?'s':''}</span>`:''}
                <div class="tgc-dots">${dots}</div>
                <span class="tgc-arrow">→</span>
              </div>
            </div>
          </div>
        </div>`;
      }).join('')}
    </div>`;
  }
  return html;
}

function renderAlumnoProgreso() {
  const alumno = SESSION.user;

  const scores = alumno.scores || [];

  const enProg = temas.filter(t=>{const p=(alumno.progreso||{})[t.id]||{}; return p.visto&&!p.completado;}).length;
  const pend = temas.length-comp-enProg;

  const R=52, C=Math.round(2*Math.PI*R), dash=Math.round(C*pct/100);
  const last8=scores.slice(-8);

    </div>

    <div style="display:grid;grid-template-columns:240px 1fr 1fr;gap:18px;margin-bottom:20px">
      <div class="card prog-donut-wrap">
        <div style="font-size:13px;font-weight:600;color:var(--ink);margin-bottom:14px;text-align:center">Progreso global</div>
        <svg width="140" height="140" viewBox="0 0 120 120">
          <circle cx="60" cy="60" r="${R}" fill="none" stroke="var(--bg3)" stroke-width="10"/>
          <circle cx="60" cy="60" r="${R}" fill="none" stroke="url(#dg)" stroke-width="10" stroke-linecap="round"
            stroke-dasharray="${C}" stroke-dashoffset="${C-dash}" transform="rotate(-90 60 60)"/>
          <defs><linearGradient id="dg" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" stop-color="#c84b31"/><stop offset="100%" stop-color="#e8b84a"/>
          </linearGradient></defs>
          <text x="60" y="55" text-anchor="middle" font-family="DM Sans,sans-serif" font-size="20" font-weight="700" fill="var(--ink)">${pct}%</text>
          <text x="60" y="70" text-anchor="middle" font-family="DM Sans,sans-serif" font-size="9" fill="var(--ink3)">completado</text>
        </svg>
        <div style="display:flex;gap:16px;margin-top:12px;justify-content:center">
          ${[['#c84b31','Comp.',comp],['#c9943a','Prog.',enProg],['var(--bg3)','Pend.',pend]].map(([c,l,v])=>`
          <div style="text-align:center">
            <div style="width:8px;height:8px;border-radius:2px;background:${c};margin:0 auto 3px"></div>
            <div style="font-size:9px;color:var(--ink3)">${l}</div>
            <div style="font-size:13px;font-weight:700">${v}</div>
          </div>`).join('')}
        </div>
      </div>

      <div class="card">
        <div class="section-title">Puntuaciones recientes</div>
        ${last8.length ? `
          <div class="bar-chart-row">
            ${last8.map((s,i)=>{
              const h=Math.max(Math.round(s/maxS*75),4);
              const c=s>=70?'#2d7a6e':s>=50?'#c9943a':'#c84b31';
              return `<div class="bar-col">
                <span style="font-size:9px;color:${c};font-weight:600">${s}%</span>
                <div class="bar-col-fill" style="height:${h}px;background:${c};opacity:.85"></div>
                <span class="bar-col-lbl">#${scores.length-last8.length+i+1}</span>
              </div>`;
            }).join('')}
          </div>
          <div style="display:flex;justify-content:space-between;font-size:11px;color:var(--ink3);margin-top:10px;padding-top:8px;border-top:1px solid var(--bg3)">
            <span>Media global: <strong style="color:${media>=70?'var(--teal)':media>=50?'var(--gold)':'var(--red)'}">${media}%</strong></span>
            <span>${scores.length} tests realizados</span>
          </div>` :
          '<div style="text-align:center;padding:30px 0;font-size:13px;color:var(--ink3)">Aún no has hecho ningún test</div>'}

        <tbody>
          ${temas.map(t=>{
            const p=(alumno.progreso||{})[t.id]||{};
            const pct=p.completado?100:p.visto?40:0;
            const col=p.completado?'var(--teal)':p.visto?'var(--gold)':'var(--ink3)';
            const txt=p.completado?'✅ Completado':p.visto?'📖 Estudiando':'⏳ Pendiente';
            const nR=t.recursos?Object.keys(t.recursos).length:0;
            return `<tr>
              <td style="font-weight:700">${t.numero||'—'}</td>
              <td style="font-size:12px;max-width:220px">${t.titulo}</td>
              <td><span class="badge badge-blue" style="font-size:10px">${t.bloque}</span></td>
              <td style="font-size:12px;color:${col};font-weight:500">${txt}</td>

async function abrirRecursoAlumno(id, tabInicial='') {
  currentTema = DB.temas.find(t=>t.id===id);
  if (!currentTema) return;

  const alumno = SESSION.user;
  if (!alumno.progreso) alumno.progreso = {};
  if (!alumno.progreso[id]) alumno.progreso[id] = {};
  alumno.progreso[id].visto = true;
  saveDB();

  const t = currentTema;
  document.getElementById('mr-title').textContent = `Tema ${t.numero||'?'} · ${t.titulo}`;

  // Build hidden content containers
  const contHTML = REC_CONFIG.map(r =>
    `<div class="rcon" id="rcon-${r.id}"></div>`
  ).join('');

  // Build card grid
  const gridHTML = buildRecGrid(t, alumno);

  document.getElementById('mr-body').innerHTML = `
    <div id="rec-grid-view">
      ${gridHTML}
    </div>
    <div id="rec-panel-view" class="rec-panel">
      <div id="rec-panel-header" class="rec-panel-header" onclick="volverAlGrid()"></div>
      <div id="rec-panel-content"></div>
    </div>
    <div style="display:none">${contHTML}</div>`;

  document.getElementById('mr-dl-recurso').style.display = 'none';
  // Mostrar "Guardar todos" solo para alumnos con recursos disponibles
  const saveAllBtn = document.getElementById('mr-save-all-btn');
  if (saveAllBtn) {
    const hasRecursos = currentTema && currentTema.recursos && Object.keys(currentTema.recursos).length > 0;
    saveAllBtn.style.display = (SESSION.role === 'alumno' && hasRecursos) ? 'inline' : 'none';
  }
  openModal('modal-recurso');

  // If a specific tab was requested (e.g. from selector view), open it directly
  if (tabInicial) {
    abrirRecurso(tabInicial);
  }
}

function buildRecGrid(t, alumno) {
  const repo = alumno.repositorio || [];
  return `<div class="rec-grid">
    ${REC_CONFIG.map(r => {
      const cached = t.recursos && t.recursos[r.id];
      const enRepo = repo.some(x => x.temaId===t.id && x.tipo===r.id);
      const esPropios = r.id === 'recursos-propios';
      const nPropios = (DB.recursosPropios||[]).filter(x=>x.publicado&&(x.temaId===t.id||x.temaId==='')).length;

      let badge, badgeClass, available;
      if (esPropios) {
        available = nPropios > 0;
        badge = available ? `${nPropios} recurso${nPropios>1?'s':''}` : 'Sin recursos';
        badgeClass = available ? 'rec-badge-ok' : 'rec-badge-pend';
      } else if (r.id === 'audio') {
        available = true; badge = '✓ Disponible'; badgeClass = 'rec-badge-ok';
      } else if (cached) {
        available = true; badge = '✓ Disponible'; badgeClass = 'rec-badge-ok';
      } else if (enRepo) {
        available = true; badge = '✓ Disponible'; badgeClass = 'rec-badge-ok';
      } else {
        available = false; badge = 'No disponible'; badgeClass = 'rec-badge-pend';
      }

      const unavailableClass = (!available && esPropios) ? ' unavailable' : '';
      const clickAction = (!available && esPropios) ? '' : `onclick="abrirRecurso('${r.id}')"`;

      return `<div class="rec-card${unavailableClass}" style="background:${r.grad}" ${clickAction}>
        <span class="rec-card-badge ${badgeClass}">${badge}</span>
        <span class="rec-card-ico">${r.ico}</span>
        <div class="rec-card-name">${r.lbl}</div>
        <div class="rec-card-desc">${r.desc}</div>
      </div>`;
    }).join('')}
  </div>`;
}

let _currentRecId = '';

function abrirRecurso(id) {
  _currentRecId = id;
  const cfg = REC_CONFIG.find(r=>r.id===id);
  if (!cfg) return;

  // Show panel, hide grid
  document.getElementById('rec-grid-view').style.display = 'none';
  document.getElementById('rec-panel-view').classList.add('open');
  document.getElementById('mr-dl-recurso').style.display = '';

async function loadRTab(id) {
  const el = document.getElementById('rcon-'+id);
  if (!el || el.dataset.loaded) return;
  el.dataset.loaded = '1';

  const t = currentTema;
  const cached = t.recursos && t.recursos[id];

  // Recursos propios y audio no necesitan IA
  if (id === 'recursos-propios') { loadRecursosPropiosAlumno(el, t); return; }
  if (id === 'audio') { loadAudio(el, t, cached); return; }

  // Si hay recurso cacheado (generado por admin), mostrarlo directamente
  if (cached) {
    switch(id) {
      case 'resumen': await loadResumen(el, t, cached); break;
      case 'slides': await loadSlides(el, t, cached); break;
      case 'cuestionario': await loadCuestionario(el, t, cached); break;
      case 'preguntas-cortas': await loadPreguntasCortas(el, t, cached); break;
      case 'flashcards': await loadFlashcards(el, t, cached); break;
      case 'infografia': await loadInfografia(el, t, cached); break;
      case 'cronologia': await loadCronologia(el, t, cached); break;
      case 'mapa': await loadMapa(el, t, cached); break;
    }
    return;
  }

  // Sin caché: si es alumno, mostrar pantalla "pendiente de generación por admin"
  // excepto para los que puede generar con Gemini él mismo
  if (SESSION.role === 'alumno') {
    mostrarRecursoPendiente(el, id, t);
    return;
  }

  // Admin sin caché: generar con IA
  switch(id) {
    case 'resumen': await loadResumen(el, t, null); break;
    case 'slides': await loadSlides(el, t, null); break;
    case 'cuestionario': await loadCuestionario(el, t, null); break;
    case 'preguntas-cortas': await loadPreguntasCortas(el, t, null); break;
    case 'flashcards': await loadFlashcards(el, t, null); break;
    case 'infografia': await loadInfografia(el, t, null); break;
    case 'cronologia': await loadCronologia(el, t, null); break;
    case 'mapa': await loadMapa(el, t, null); break;
  }
}

async function claude(prompt, system='Eres experto en oposiciones de Inspección Educativa en Extremadura. Responde en español.', forceProvider=null) {
  // Solo el admin genera recursos con IA (Anthropic Claude)
  if (SESSION.role === 'alumno') throw new Error('Generación de recursos no disponible para alumnos.');
  if (!CFG.apiKey) throw new Error('Sin API Key de Anthropic. Ve a ⚙️ Configuración para añadirla.');
  {
    const r = await fetch('https://api.anthropic.com/v1/messages', {
      method:'POST',
      headers:{'Content-Type':'application/json','x-api-key':CFG.apiKey,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},
      body: JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:2000,system,messages:[{role:'user',content:prompt}]})
    });
    const d = await r.json();
    if (d.error) throw new Error(d.error.message);
    return d.content.map(c=>c.text||'').join('');
  }
}

async function claudeJSON(prompt, system) {
  const txt = await claude(prompt, system||'Devuelve SOLO JSON válido sin markdown ni texto adicional. Sin comillas extras al inicio o al final.');
  return JSON.parse(txt.replace(/```json|```/g,'').trim());
}

function renderAudio(el, texto, titulo) {
  el.innerHTML = `
    <div style="margin-bottom:16px">
      <div class="audio-bar">
        <button class="audio-play-btn" id="audio-btn" onclick="toggleAudio('${encodeURIComponent(texto.slice(0,2000))}')">▶</button>
        <div>
          <div class="audio-label">Narración del resumen</div>

        </div>
        <select id="voice-select" style="margin-left:auto;font-size:11px;border:1px solid var(--border);border-radius:4px;padding:4px 8px;background:var(--bg2)"></select>

      </div>
    </div>

      <strong>Consejo:</strong> Para mejor experiencia, usa auriculares. La velocidad y voz dependen del navegador y sistema operativo.
    </div>`;
  populateVoices();
}

function populateVoices() {
  const sel = document.getElementById('voice-select');
  if (!sel) return;
  const voices = speechSynth.getVoices().filter(v=>v.lang.startsWith('es'));
  sel.innerHTML = voices.map((v,i)=>`<option value="${i}">${v.name}</option>`).join('');
  if (!voices.length) setTimeout(populateVoices, 500);
}

function toggleAudio(encodedTxt) {
  const txt = decodeURIComponent(encodedTxt);
  const btn = document.getElementById('audio-btn');
  if (speechSynth.speaking) { speechSynth.cancel(); btn.textContent='▶'; return; }
  speechUtterance = new SpeechSynthesisUtterance(txt);
  speechUtterance.lang = 'es-ES';
  const sel = document.getElementById('voice-select');
  const voices = speechSynth.getVoices().filter(v=>v.lang.startsWith('es'));
  if (sel && voices[parseInt(sel.value)]) speechUtterance.voice = voices[parseInt(sel.value)];
  speechUtterance.rate = 0.95;
  speechUtterance.onend = () => { if(btn) btn.textContent='▶'; };
  speechSynth.speak(speechUtterance);
  btn.textContent = '⏸';
}

function stopAudio() { speechSynth?.cancel(); }

function renderSlides(el, slides) {

function renderSlide(i) {
  const s = currentSlides[i];
  document.getElementById('slide-title').textContent = s.titulo;
  document.getElementById('slide-body').textContent = s.contenido;
  document.getElementById('slide-num').textContent = (i+1)+' / '+currentSlides.length;
  document.querySelectorAll('.slide-dot').forEach((d,j)=>d.classList.toggle('active',j===i));
}

function nextSlide() { slideIdx=(slideIdx+1)%currentSlides.length; renderSlide(slideIdx); }
function prevSlide() { slideIdx=(slideIdx-1+currentSlides.length)%currentSlides.length; renderSlide(slideIdx); }
function goSlide(i) { slideIdx=i; renderSlide(i); }
function narrarSlide() {
  const s = currentSlides[slideIdx];
  if (!s) return;
  stopAudio();
  speechUtterance = new SpeechSynthesisUtterance(s.titulo+'. '+s.contenido);
  speechUtterance.lang='es-ES'; speechUtterance.rate=0.95;
  speechSynth.speak(speechUtterance);
}

    cacheRecurso('cuestionario', data);

function renderCuestionario(el, qs) {
  currentQuiz = qs;
  let html = `<div id="quiz-wrap">`;
  qs.forEach((q,i)=>{
    html += `<div class="q-card" id="qc-${i}">
      <div class="q-text">${i+1}. ${q.pregunta}</div>
      ${q.opciones.map((o,j)=>`<label class="q-opt" id="qo-${i}-${j}"><input type="radio" name="q${i}" value="${j}"> ${o}</label>`).join('')}
      <div class="q-exp" id="qe-${i}">${q.explicacion}</div>
    </div>`;
  });
  html += `<div style="text-align:center;margin-top:14px"><button class="btn btn-primary" onclick="corregirTest()">Corregir test →</button></div></div>`;
  el.innerHTML = html;
}

function corregirTest() {
  let ok=0;
  currentQuiz.forEach((q,i)=>{
    const sel = document.querySelector(`input[name="q${i}"]:checked`);
    document.getElementById('qe-'+i).style.display='block';
    if (!sel) return;
    const v=parseInt(sel.value);
    document.getElementById(`qo-${i}-${v}`).classList.add(v===q.correcta?'correct':'wrong');
    if (v!==q.correcta) document.getElementById(`qo-${i}-${q.correcta}`).classList.add('correct');
    if (v===q.correcta) ok++;
  });
  const pct=Math.round(ok/currentQuiz.length*100);
  const alumno=SESSION.user;
  if (!alumno.scores) alumno.scores=[];
  alumno.scores.push(pct);
  if (!alumno.progreso) alumno.progreso={};
  if (currentTema && !alumno.progreso[currentTema.id]) alumno.progreso[currentTema.id]={};
  if (currentTema) alumno.progreso[currentTema.id].visto=true;
  saveDB();
  const sc=document.createElement('div');
  sc.className='quiz-score';
  sc.innerHTML=`<div class="score-num">${pct}%</div><div class="score-lbl">${ok}/${currentQuiz.length} correctas</div>`;
  document.getElementById('quiz-wrap').appendChild(sc);
}

function renderPreguntasCortas(el, qs) {
  currentSA = qs;
  el.innerHTML = `<div id="sa-wrap">
    ${qs.map((q,i)=>`
      <div class="sa-q" id="sa-${i}">
        <div class="sa-q-text">${i+1}. ${q.pregunta}</div>

        <div style="display:flex;gap:7px;margin-top:7px">
          <button class="btn btn-primary btn-xs" onclick="corregirSA(${i})">Corregir con IA →</button>
          <button class="btn btn-ghost btn-xs" onclick="verRespuesta(${i})">Ver respuesta modelo</button>
        </div>
        <div class="sa-feedback" id="saf-${i}"></div>
        <div id="sar-${i}" style="display:none;margin-top:8px;padding:10px 12px;background:rgba(45,122,110,.08);border-radius:6px;font-size:12px;color:var(--teal);line-height:1.6">${q.respuesta_esperada}</div>
      </div>`).join('')}

async function corregirSA(i) {
  const respuesta = document.getElementById('sat-'+i).value.trim();
  if (!respuesta) { alert('Escribe tu respuesta primero'); return; }
  const q = currentSA[i];
  const fb = document.getElementById('saf-'+i);
  fb.style.display='block'; fb.className='sa-feedback'; fb.textContent='Analizando tu respuesta...';
  try {
    const feedback = await claude(`
Pregunta: "${q.pregunta}"
Respuesta modelo: "${q.respuesta_esperada}"
Criterios clave: ${q.criterios.join(', ')}
Respuesta del alumno: "${respuesta}"

Evalúa la respuesta del alumno de forma constructiva. Indica:
1. Puntuación estimada (0-10)
2. Qué ha respondido correctamente
3. Qué falta o está incorrecto
4. Sugerencia de mejora

Sé específico, constructivo y breve (máximo 6 líneas).`);
    const score = (feedback.match(/\d+/)||[])[0];
    const isGood = score && parseInt(score) >= 6;
    fb.className = 'sa-feedback ' + (isGood ? 'good' : 'bad');
    fb.textContent = feedback;
  } catch(e) {
    fb.className='sa-feedback bad';
    fb.textContent='Error al corregir: '+e.message;
  }
}

function verRespuesta(i) {
  const el = document.getElementById('sar-'+i);
  el.style.display = el.style.display==='none' ? 'block' : 'none';
}

function flipFC() { document.getElementById('fc-card')?.classList.toggle('flipped'); }
function nextFC(e) { e.stopPropagation(); fcIdx=(fcIdx+1)%currentFlashcards.length; const el=document.getElementById('rcon-flashcards'); if(el) renderFC(el); }
function prevFC(e) { e.stopPropagation(); fcIdx=(fcIdx-1+currentFlashcards.length)%currentFlashcards.length; const el=document.getElementById('rcon-flashcards'); if(el) renderFC(el); }

function renderMapa(el, d) {
  const cols=[{f:'#C84B31',l:'#FAECEA'},{f:'#2D7A6E',l:'#E1F5F1'},{f:'#2C5F8A',l:'#E6F1FB'},{f:'#5C3A7E',l:'#EEE8F6'}];
  const W=640,H=400,cx=W/2,cy=H/2;
  const pos=[{x:cx,y:60},{x:W-70,y:cy},{x:cx,y:H-55},{x:70,y:cy}];
  let lines='',nodes='';
  d.ramas.forEach((rama,i)=>{
    const p=pos[i],c=cols[i];
    lines+=`<line x1="${cx}" y1="${cy}" x2="${p.x}" y2="${p.y}" stroke="${c.f}" stroke-width="1.5" stroke-opacity=".5"/>`;
    const rW=Math.max(rama.nombre.length*8+20,90),rH=30;
    nodes+=`<rect x="${p.x-rW/2}" y="${p.y-rH/2}" width="${rW}" height="${rH}" rx="7" fill="${c.f}"/><text x="${p.x}" y="${p.y+1}" text-anchor="middle" dominant-baseline="central" font-family="DM Sans,sans-serif" font-size="11" font-weight="600" fill="#fff">${rama.nombre}</text>`;
    const n=rama.conceptos.length;
    rama.conceptos.forEach((cc,j)=>{
      let lx,ly;
      if(i===0){lx=cx+(j-(n-1)/2)*120;ly=16;}
      else if(i===1){lx=W-10;ly=cy+(j-(n-1)/2)*55;}
      else if(i===2){lx=cx+(j-(n-1)/2)*120;ly=H-12;}
      else{lx=10;ly=cy+(j-(n-1)/2)*55;}
      lines+=`<line x1="${p.x}" y1="${p.y}" x2="${lx}" y2="${ly}" stroke="${c.f}" stroke-width="1" stroke-opacity=".3" stroke-dasharray="3 3"/>`;
      const cW=Math.max(cc.length*7+14,70),cH=22;
      nodes+=`<rect x="${lx-cW/2}" y="${ly-cH/2}" width="${cW}" height="${cH}" rx="5" fill="${c.l}" stroke="${c.f}" stroke-width=".7"/><text x="${lx}" y="${ly+1}" text-anchor="middle" dominant-baseline="central" font-family="DM Sans,sans-serif" font-size="10" fill="${c.f}">${cc}</text>`;
    });
  });
  const mW=Math.max(d.concepto_central.length*9+24,110),mH=44;
  el.innerHTML=`<svg viewBox="0 0 ${W} ${H}" style="width:100%;background:var(--bg);border-radius:var(--r)">
    ${lines}
    <rect x="${cx-mW/2}" y="${cy-mH/2}" width="${mW}" height="${mH}" rx="10" fill="#1a1a2e"/>
    <text x="${cx}" y="${cy+1}" text-anchor="middle" dominant-baseline="central" font-family="Playfair Display,serif" font-size="12" font-weight="600" fill="#fff">${d.concepto_central}</text>
    ${nodes}
  </svg>`;
}

async function generarTodosRecursos(id) {
  const t = DB.temas.find(x=>x.id===id);
  if (!t) return;
  if (!confirm(`¿Generar todos los recursos para "${t.titulo}"? Esto puede tardar 1-2 minutos.`)) return;
  currentTema = t;
  await generarTodosRecursosParaTema(t);
  alert('✓ Recursos generados y guardados');
  renderAdminTemas();
}

async function generarTodosRecursosParaTema(t) {
  currentTema = t;
  if (!t.recursos) t.recursos = {};
  const loaders = [
    ['resumen', async()=>{ const el=document.createElement('div'); await loadResumen(el,t,null); }],
    ['cuestionario', async()=>{ const el=document.createElement('div'); await loadCuestionario(el,t,null); }],
    ['preguntas-cortas', async()=>{ const el=document.createElement('div'); await loadPreguntasCortas(el,t,null); }],
    ['flashcards', async()=>{ const el=document.createElement('div'); await loadFlashcards(el,t,null); }],
    ['infografia', async()=>{ const el=document.createElement('div'); await loadInfografia(el,t,null); }],
    ['cronologia', async()=>{ const el=document.createElement('div'); await loadCronologia(el,t,null); }],
    ['mapa', async()=>{ const el=document.createElement('div'); await loadMapa(el,t,null); }],
    ['slides', async()=>{ const el=document.createElement('div'); await loadSlides(el,t,null); }],
  ];
  for (const [,fn] of loaders) { try { await fn(); } catch(e) { console.warn(e); } }
}

function descargarTemaPDF() {
  if (!currentTema) return;
  const t = currentTema;

  // Intentar PDF original si existe y es válido
  const b64 = t.pdfBase64 || getPDFFromStore(t.id);
  if (b64) {
    try {
      // Convertir data URL a blob para descarga fiable
      const arr = b64.split(',');
      const mime = arr[0].match(/:(.*?);/)[1];
      const bstr = atob(arr[1]);
      const u8 = new Uint8Array(bstr.length);
      for (let i = 0; i < bstr.length; i++) u8[i] = bstr.charCodeAt(i);
      const blob = new Blob([u8], {type: mime});
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = `Tema_${t.numero||'0'}_${(t.titulo||'').slice(0,40).replace(/[^\w\sáéíóúÁÉÍÓÚñÑ]/g,'').trim()}.pdf`;
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      setTimeout(() => URL.revokeObjectURL(url), 10000);
      return;
    } catch(e) {
      console.warn('PDF base64 error, fallback to HTML:', e);
    }
  }

  // Sin PDF original: generar documento HTML bien maquetado para imprimir
  const parrafos = (t.contenido||'').split('\n')
    .map(p => p.trim()).filter(p => p.length > 0)
    .map(p => `<p>${p.replace(/</g,'&lt;').replace(/>/g,'&gt;')}</p>`)
    .join('\n');

  const html = `<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Tema ${t.numero||''} · ${(t.titulo||'').replace(/</g,'&lt;')}</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: Georgia, 'Times New Roman', serif; max-width: 800px; margin: 0 auto;
         padding: 40px; color: #1a1a2e; line-height: 1.9; font-size: 14px; background: #fff; }
  .cover { border-left: 5px solid #c84b31; padding: 16px 20px; margin-bottom: 32px; background: #fdf8f7; }
  .badge { display: inline-block; background: #c84b31; color: #fff; font-size: 10px;
           font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase;
           padding: 3px 10px; border-radius: 3px; margin-bottom: 10px; font-family: Arial, sans-serif; }
  h1 { font-size: 20px; color: #1a1a2e; line-height: 1.35; margin-bottom: 6px; }
  .meta { font-size: 11px; color: #8a8aaa; font-family: Arial, sans-serif; }
  hr { border: none; border-top: 1px solid #e0ddd6; margin: 28px 0; }
  p { margin-bottom: 14px; text-align: justify; }
  @page { margin: 20mm; }
  @media print { body { padding: 0; } .cover { break-inside: avoid; } }
</style>
</head>
<body>
  <div class="cover">
    <div class="badge">Tema ${t.numero||'—'}</div>
    <h1>${(t.titulo||'').replace(/</g,'&lt;')}</h1>
    <div class="meta">${t.bloque||''} &nbsp;·&nbsp; Inspección Educativa de Extremadura</div>
  </div>
  <hr>
  ${parrafos}
  <script>
    window.addEventListener('load', function() {
      setTimeout(function() { window.print(); }, 600);
    });
  <\/script>
</body>
</html>`;

  abrirVentanaHTML(html);
}

// Intenta recuperar PDF guardado en IndexedDB si localStorage se quedó sin espacio
function getPDFFromStore(temaId) {
  try {
    return localStorage.getItem('pdf-' + temaId);
  } catch(e) { return null; }
}

function descargarRecursoActual() {
  if (!currentTema) return;
  // Find which tab is active
  const tabActiva = document.querySelector('.rtab.active');
  if (!tabActiva) return;
  const onclick = tabActiva.getAttribute('onclick') || '';
  const match = onclick.match(/switchRTab\('([^']+)'\)/);
  const tabId = match ? match[1] : 'resumen';
  const t = currentTema;
  const recurso = t.recursos?.[tabId];

  if (tabId === 'cuestionario' && recurso) {
    descargarCuestionarioPDF(t, recurso);
  } else if (tabId === 'flashcards' && recurso) {
    descargarFlashcardsPDF(t, recurso);
  } else if (tabId === 'infografia') {
    descargarInfografiaHTML(t);
  } else if (recurso) {
    descargarResumenPDF(t, tabId, recurso);
  } else {
    alert('Este recurso aún no ha sido generado o no tiene contenido descargable.');
  }
}

function abrirVentanaHTML(html) {
  // Most reliable: create a blob, make a link, click it
  try {
    const blob = new Blob([html], {type: 'text/html;charset=utf-8'});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.target = '_blank';
    a.rel = 'noopener';
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    setTimeout(() => URL.revokeObjectURL(url), 15000);
  } catch(e) {
    // Last resort: write to new window directly
    const w = window.open('', '_blank');
    if (w) { w.document.write(html); w.document.close(); }
    else { alert('Tu navegador está bloqueando la apertura. Por favor, permite ventanas emergentes para esta página.'); }
  }
}

  const titulo = document.getElementById('rp-titulo').value.trim();
  if (!titulo) { alert('El título es obligatorio'); return; }
  if (!DB.recursosPropios) DB.recursosPropios = [];
  const data = {
    id: id || 'RP'+Date.now(),
    titulo, tipo: document.getElementById('rp-tipo').value,
    temaId: document.getElementById('rp-tema').value,
    descripcion: document.getElementById('rp-desc').value.trim(),
    url: document.getElementById('rp-url')?.value.trim() || '',
    contenido: document.getElementById('rp-contenido')?.value.trim() || '',
    publicado: document.getElementById('rp-pub').checked,
    fecha: new Date().toISOString()
  };
  if (id) {
    const idx = DB.recursosPropios.findIndex(r=>r.id===id);
    if (idx>=0) DB.recursosPropios[idx] = data;
  } else {
    DB.recursosPropios.push(data);
    // Also attach to tema if selected
    if (data.temaId) {
      const tema = DB.temas.find(t=>t.id===data.temaId);
      if (tema) { if(!tema.recursosPropios) tema.recursosPropios=[]; tema.recursosPropios.push(data.id); }
    }
  }
  saveDB(); closeModal('modal-tema'); renderAdminRecursosPropios();
}

function editarRecursoPropio(id) { openNuevoRecursoPropio(id); }

function togglePublicarRP(id) {
  const r = (DB.recursosPropios||[]).find(x=>x.id===id);
  if (r) { r.publicado=!r.publicado; saveDB(); renderAdminRecursosPropios(); }
}

function eliminarRecursoPropio(id) {
  if (!confirm('¿Eliminar este recurso?')) return;
  DB.recursosPropios = (DB.recursosPropios||[]).filter(r=>r.id!==id);
  DB.temas.forEach(t=>{ if(t.recursosPropios) t.recursosPropios=t.recursosPropios.filter(x=>x!==id); });
  saveDB(); renderAdminRecursosPropios();
}

// ═══════════════════════════════════════════
// ALUMNO — REPOSITORIO PERSONAL
// ═══════════════════════════════════════════
function guardarEnRepositorioAlumno(tipo, tema, datos, silencioso=false) {
  const alumno = SESSION.user;
  if (!alumno.repositorio) alumno.repositorio = [];
  // Evitar duplicados del mismo tipo+tema
  const yaExiste = alumno.repositorio.some(r => r.temaId===tema.id && r.tipo===tipo);
  if (yaExiste) {
    // Actualizar datos si ya existe
    alumno.repositorio = alumno.repositorio.map(r =>
      (r.temaId===tema.id && r.tipo===tipo) ? {...r, datos, fecha: new Date().toISOString()} : r
    );
  } else {
    alumno.repositorio.push({
      id: 'repo-'+Date.now(),
      temaId: tema.id,
      temaTitulo: tema.titulo,
      temaNro: tema.numero,
      temaBloque: tema.bloque,
      tipo, fecha: new Date().toISOString(),
      datos
    });
  }
  saveDB();
  if (!silencioso) mostrarToast(`💾 ${tipo} guardado en tu repositorio`);
}

function guardarTodosEnRepositorio(temaId) {
  const t = DB.temas.find(x=>x.id===temaId);
  if (!t || !t.recursos) return;
  let count = 0;
  Object.entries(t.recursos).forEach(([tipo, datos]) => {
    guardarEnRepositorioAlumno(tipo, t, datos, true);
    count++;
  });
  mostrarToast(`💾 ${count} recursos guardados en tu repositorio`);
  // Refresh grid badges
  if (currentTema && currentTema.id === temaId) {
    const grid = document.getElementById('rec-grid-view');
    if (grid) grid.innerHTML = buildRecGrid(t, SESSION.user);
  }
}

function estaEnRepo(temaId, tipo) {
  return (SESSION.user.repositorio||[]).some(r => r.temaId===temaId && r.tipo===tipo);
}

function toggleRepo(temaId, tipo) {
  const t = DB.temas.find(x=>x.id===temaId);
  if (!t) return;
  const datos = t.recursos?.[tipo];
  if (!datos) { mostrarToast('⚠️ Este recurso no está disponible aún'); return; }
  const alumno = SESSION.user;
  if (!alumno.repositorio) alumno.repositorio = [];
  const yaEsta = estaEnRepo(temaId, tipo);
  if (yaEsta) {
    alumno.repositorio = alumno.repositorio.filter(r => !(r.temaId===temaId && r.tipo===tipo));
    saveDB();
    mostrarToast('🗑️ Eliminado del repositorio');
  } else {
    guardarEnRepositorioAlumno(tipo, t, datos, true);
    mostrarToast('💾 Guardado en tu repositorio');
  }
  // Update save button in panel if visible
  const btn = document.getElementById('repo-toggle-btn');
  if (btn) btn.innerHTML = estaEnRepo(temaId, tipo) ? '💾 En repositorio' : '+ Guardar';
}

function mostrarToast(msg) {
  const t = document.createElement('div');
  t.style.cssText = 'position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#1a1a2e;color:#fff;padding:10px 20px;border-radius:30px;font-size:13px;font-weight:500;z-index:9999;box-shadow:0 4px 16px rgba(0,0,0,.3);pointer-events:none;transition:opacity .3s';
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(()=>{t.style.opacity='0';setTimeout(()=>t.remove(),300)}, 2200);
}

function renderAlumnoRepositorio() {
  document.getElementById('topbar-actions').innerHTML = '';
  const alumno = SESSION.user;
  const repo = alumno.repositorio || [];
  const totalTemas = [...new Set(repo.map(r=>r.temaId))].length;

  document.getElementById('main-content').innerHTML = `
    <div class="hero-banner" style="margin-bottom:20px">
      <div class="hero-title">Mi repositorio 🗃️</div>
      <div class="hero-sub">${repo.length} recursos guardados · ${totalTemas} tema${totalTemas!==1?'s':''} · Accede aquí a tus materiales favoritos</div>
    </div>
    ${!repo.length ? `
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:24px">
        <div class="card" style="border:2px dashed var(--border);background:var(--bg);text-align:center;padding:32px 20px">
          <div style="font-size:36px;margin-bottom:12px">📚</div>
          <div style="font-size:14px;font-weight:600;color:var(--ink);margin-bottom:6px">Abre un tema</div>
          <div style="font-size:12px;color:var(--ink3);margin-bottom:14px">Entra en cualquier tema y guarda los recursos que más te interesen</div>
          <button class="btn btn-primary btn-sm" onclick="showPage('alumno-temas')">Ver mis temas →</button>
        </div>
        <div class="card" style="border:2px dashed var(--border);background:var(--bg);text-align:center;padding:32px 20px">
          <div style="font-size:36px;margin-bottom:12px">💾</div>
          <div style="font-size:14px;font-weight:600;color:var(--ink);margin-bottom:6px">Guarda recursos</div>
          <div style="font-size:12px;color:var(--ink3)">Usa el botón "+ Guardar" al abrir cualquier recurso, o "💾 Guardar todos" para guardarlos de golpe</div>
        </div>
      </div>` : `
      <div style="display:flex;gap:10px;margin-bottom:18px;align-items:center;flex-wrap:wrap">
        <input class="form-input" style="flex:1;min-width:160px" placeholder="🔍 Buscar en repositorio..." id="repo-search" oninput="filterRepositorio()">
        <select class="form-input" style="width:auto" id="repo-filter-tema" onchange="filterRepositorio()">
          <option value="">Todos los temas</option>
          ${[...new Set(repo.map(r=>r.temaId))].map(tid=>{
            const r = repo.find(x=>x.temaId===tid);
            return `<option value="${tid}">${r.temaNro?'T'+r.temaNro+' — ':''}${(r.temaTitulo||tid).slice(0,40)}</option>`;
          }).join('')}
        </select>
        <select class="form-input" style="width:auto" id="repo-filter-tipo" onchange="filterRepositorio()">
          <option value="">Todos los tipos</option>
          ${[...new Set(repo.map(r=>r.tipo))].map(tp=>{
            const c = REC_CONFIG.find(x=>x.id===tp);
            return `<option value="${tp}">${c?c.ico+' '+c.lbl:tp}</option>`;
          }).join('')}
        </select>
        <button class="btn btn-danger btn-sm" onclick="limpiarRepositorio()">🗑️ Vaciar</button>
      </div>
      <div id="repo-list">${buildRepoList(repo)}</div>`}`;
}

function buildRepoList(repo) {
  if (!repo.length) return `<div class="empty"><div class="empty-ico">🔍</div><div class="empty-tit">Sin resultados</div></div>`;
  // Group by tema
  const byTema = {};
  repo.forEach(r => { if (!byTema[r.temaId]) byTema[r.temaId]=[]; byTema[r.temaId].push(r); });
  return Object.entries(byTema).map(([tid, items])=>{
    const first = items[0];
    const bClass = first.temaBloque==='Bloque I'?'b1':first.temaBloque==='Bloque II'?'b2':first.temaBloque==='Bloque III'?'b3':'b4';
    const grads = {b1:'linear-gradient(135deg,#c84b31,#e8734a)',b2:'linear-gradient(135deg,#2d7a6e,#3da090)',b3:'linear-gradient(135deg,#2c5f8a,#4a8fc4)',b4:'linear-gradient(135deg,#5c3a7e,#8a5ab0)'};
    return `<div class="card" style="margin-bottom:18px;overflow:hidden">
      <div style="background:${grads[bClass]||grads.b1};padding:14px 18px;display:flex;align-items:center;gap:12px;margin:-22px -22px 16px">
        <div style="width:38px;height:38px;border-radius:10px;background:rgba(255,255,255,.2);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:14px;flex-shrink:0">T${first.temaNro||'?'}</div>
        <div style="flex:1">
          <div style="font-size:13px;font-weight:600;color:#fff;line-height:1.3">${first.temaTitulo||'Tema'}</div>
          <div style="font-size:10px;color:rgba(255,255,255,.65)">${first.temaBloque||''} · ${items.length} recurso${items.length>1?'s':''} guardado${items.length>1?'s':''}</div>
        </div>
        <button onclick="abrirRecursoAlumno('${tid}')" style="background:rgba(255,255,255,.2);border:1px solid rgba(255,255,255,.3);color:#fff;padding:5px 12px;border-radius:20px;font-size:11px;font-weight:600;cursor:pointer">Abrir tema →</button>
      </div>
      <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:10px">
        ${items.map(r=>{
          const cfg = REC_CONFIG.find(x=>x.id===r.tipo) || {ico:'📄',lbl:r.tipo,grad:'linear-gradient(135deg,#888,#aaa)'};
          return `<div style="border-radius:12px;overflow:hidden;cursor:pointer;transition:.2s;box-shadow:var(--sh)"
               onclick="verRecursoRepositorio('${r.id}')"
               onmouseenter="this.style.transform='translateY(-2px)';this.style.boxShadow='0 6px 20px rgba(0,0,0,.12)'"
               onmouseleave="this.style.transform='';this.style.boxShadow='var(--sh)'">
            <div style="background:${cfg.grad};padding:14px 12px 10px;text-align:center">
              <div style="font-size:24px;margin-bottom:4px">${cfg.ico}</div>
              <div style="font-size:11px;font-weight:600;color:#fff;line-height:1.3">${cfg.lbl}</div>
            </div>
            <div style="background:var(--bg2);padding:8px 10px;display:flex;justify-content:space-between;align-items:center">
              <span style="font-size:10px;color:var(--ink3)">${new Date(r.fecha).toLocaleDateString('es-ES')}</span>
              <button onclick="event.stopPropagation();eliminarDeRepo('${r.id}')"
                style="background:none;border:none;cursor:pointer;font-size:12px;color:var(--ink3);padding:0;line-height:1" title="Eliminar">✕</button>
            </div>
          </div>`;
        }).join('')}
      </div>
    </div>`;
  }).join('');
}

function filterRepositorio() {
  const alumno = SESSION.user;
  const repo = alumno.repositorio || [];
  const q = document.getElementById('repo-search')?.value?.toLowerCase() || '';
  const filterTema = document.getElementById('repo-filter-tema')?.value || '';
  const filterTipo = document.getElementById('repo-filter-tipo')?.value || '';
  const filtered = repo.filter(r =>
    (!q || (r.temaTitulo||'').toLowerCase().includes(q) || (r.tipo||'').includes(q)) &&
    (!filterTema || r.temaId===filterTema) &&
    (!filterTipo || r.tipo===filterTipo)
  );
  document.getElementById('repo-list').innerHTML = buildRepoList(filtered);
}

async function verRecursoRepositorio(repoId) {
  const alumno = SESSION.user;
  const r = (alumno.repositorio||[]).find(x=>x.id===repoId);
  if (!r) return;
  // Set currentTema temporarily and open the resource
  currentTema = DB.temas.find(t=>t.id===r.temaId) || {id:r.temaId, titulo:r.temaTitulo, numero:r.temaNro, bloque:r.temaBloque, recursos:{}, contenido:''};
  if (!currentTema.recursos) currentTema.recursos = {};
  currentTema.recursos[r.tipo] = r.datos;
  // Open resource modal then navigate to resource
  await abrirRecursoAlumno(r.temaId, r.tipo);
}

function eliminarDeRepo(repoId) {
  if (!confirm('¿Eliminar este recurso del repositorio?')) return;
  const alumno = SESSION.user;
  alumno.repositorio = (alumno.repositorio||[]).filter(r=>r.id!==repoId);
  saveDB();
  renderAlumnoRepositorio();
}

function limpiarRepositorio() {
  if (!confirm('¿Eliminar todos los recursos de tu repositorio? Esta acción no se puede deshacer.')) return;
  SESSION.user.repositorio = [];
  saveDB();
  renderAlumnoRepositorio();
}

// Close modals on overlay click
document.querySelectorAll('.modal-overlay').forEach(o=>o.addEventListener('click',e=>{if(e.target===o){o.classList.remove('open');stopAudio();}}));
</script>
